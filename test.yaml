cabs:
  tester:
    name: test
    flavour: python-code
    command: |
      print(f'{msg}')
    inputs:
      msg:
        dtype: str
        required: true

test:
  name: test
  info: Test recipe

  inputs:
    foo:
      dtype: str
      required: true
      abbreviation: f

  outputs:
    bar:
      dtype: str
      implicit: =STRIPEXT(recipe.foo) + '.fits'

  steps:
    teststep:
      cab: tester
      params:
        msg: =recipe.bar